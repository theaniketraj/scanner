<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Scanner</title>
    <script type="module" crossorigin src="/assets/index-BnNv8EGz.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DalTHDFk.css">
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>Secure OCR</h1>
        <p>Offline & Private</p>
      </header>

      <main>
        <div id="image-container" class="placeholder">
          <img id="preview-img" alt="Scan Preview" style="display: none" />
          <span id="placeholder-text">No document scanned</span>
        </div>

        <div class="output-container">
          <label>Extracted Text:</label>
          <textarea
            id="output-text"
            readonly
            placeholder="Text will appear here..."
          ></textarea>
        </div>

        <p id="status-msg">Ready to scan</p>
      </main>

      <footer>
        <button id="scan-btn">📷 Scan Document</button>
      </footer>
    </div>

  </body>
</html>
